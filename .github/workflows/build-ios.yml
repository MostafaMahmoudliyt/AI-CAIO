name: Build iOS IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - run: flutter pub get
      
      - run: flutter build ios --release --no-codesign
      
      - name: Create IPA from Runner.app
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r AI-CAIO-iOS.ipa Payload
      
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: AI-CAIO-iOS.ipa
